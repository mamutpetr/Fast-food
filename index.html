<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Sweetbucks Coffee</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- TOP HUD -->
  <div id="hud">
    <div id="hud-left">
      <div class="hud-chip gold-chip">
        <span>🪙</span><span id="money-val">0</span>
      </div>
      <div class="hud-chip brown-chip">
        <span>⭐</span><span id="level-val">Lv 1</span>
      </div>
    </div>
    <div id="hud-logo">☕ SWEETBUCKS</div>
    <div id="hud-right">
      <button id="shop-btn">🛒</button>
    </div>
  </div>

  <!-- GAME CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <!-- JOYSTICK -->
  <div id="joy-zone">
    <div id="joy-base"><div id="joy-knob"></div></div>
  </div>

  <!-- ACTION BTN -->
  <div id="act-zone">
    <button id="act-btn">
      <div id="act-icon">✋</div>
      <div id="act-lbl">ACT</div>
    </button>
  </div>

  <!-- BOTTOM CLAIM -->
  <div id="bottom-bar">
    <button id="claim-btn">💸 Забрати зароблене в бота</button>
  </div>

  <!-- SHOP SHEET -->
  <div id="shop-wrap" class="hidden">
    <div id="shop-scrim"></div>
    <div id="shop-sheet">
      <div id="shop-top">
        <span id="shop-heading">☕ Upgrades</span>
        <span id="shop-coins">🪙 <b id="shop-bal">0</b></span>
        <button id="shop-x">✕</button>
      </div>
      <div id="shop-list"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- START SCREEN -->
  <div id="splash">
    <div id="splash-bg"></div>
    <div id="splash-card">
      <div id="splash-sign">
        <div id="sign-board">
          <div id="sign-stripe"></div>
          <div id="sign-text">☕ SWEETBUCKS COFFEE</div>
        </div>
        <div id="sign-counter"></div>
        <div id="sign-cups">
          <span class="cup">☕</span>
          <span class="cup big">☕</span>
          <span class="cup">☕</span>
        </div>
      </div>
      <h1 id="splash-title">SWEETBUCKS</h1>
      <p id="splash-sub">Run the busiest coffee shop in town!</p>
      <div id="splash-tags">
        <span class="tag">☕ Brew</span>
        <span class="tag">🏃 Serve</span>
        <span class="tag">💰 Earn</span>
        <span class="tag">⬆️ Upgrade</span>
      </div>
      <button id="splash-btn">▶ Open Shop</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
